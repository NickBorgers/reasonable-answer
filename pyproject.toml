[project]
name = "reasonable-answer"
version = "0.1.0"
description = "Isolation-pipeline report refiner: alternating write/critique game with a blind referee"
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.2.60",
    "langgraph-checkpoint-sqlite>=2.0.0",
    "openai>=1.60.0",
    "pydantic>=2.9.0",
    "pyyaml>=6.0",
    "typer>=0.15.0",
    "rich>=13.9.0",
]

[project.scripts]
ra = "reasonable_answer.cli:app"

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-cov>=6.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reasonable_answer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
markers = ["live: hits the real LiteLLM proxy (deselect with '-m \"not live\"')"]
