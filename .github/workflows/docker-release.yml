name: Docker Release

# Builds and publishes the runtime image to GHCR for deployment.
#
# Runs after merge, not on PRs — pr-validation.yml builds the same Dockerfile without
# pushing, so a broken image is caught before it gets here.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Default for any job that does not declare its own.
permissions:
  contents: read

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # BuildKit's default attestations produce an OCI manifest list without usable platform
  # metadata for some consumers, which breaks the push. Disabling them is an explicit
  # compatibility choice, not an oversight.
  BUILDX_NO_DEFAULT_ATTESTATIONS: '1'

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.name.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      # `github.repository` preserves the owner's capitalisation (NickBorgers/...), and
      # Docker rejects uppercase in a reference. This must be lowercased everywhere the
      # image name is used.
      - name: Compute lowercase image name
        id: name
        run: echo "image=${REGISTRY}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.name.outputs.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # arm64 is safe here only because the Dockerfile deliberately stays on glibc
          # slim: pydantic-core, jiter and orjson all publish manylinux wheels, so no
          # cross-compilation toolchain is needed. Moving to alpine would break this.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ steps.name.outputs.image }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ steps.name.outputs.image }}:buildcache,mode=max

      - name: Summary
        run: |
          {
            echo "### Pushed"
            echo
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  verify-pushed-image:
    name: Verify Pushed Image
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pull back by DIGEST, not by a reconstructed tag string. A tag is a name that
      # happens to point at an artifact today; the digest is the artifact. Verifying the
      # tag would also silently stop testing anything real if the tag pattern changed.
      - name: Pull the published image by digest
        run: docker pull "${{ needs.build-and-push.outputs.image }}@${{ needs.build-and-push.outputs.digest }}"

      - name: Smoke test
        run: ./scripts/smoke-test-image.sh "${{ needs.build-and-push.outputs.image }}@${{ needs.build-and-push.outputs.digest }}"
