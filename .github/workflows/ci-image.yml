name: CI Image

# Builds the agent image the review and resolver workflows run inside.
#
# Must be dispatched once manually before any agent workflow can run — nothing else
# creates the `:latest` tag those workflows pull.

on:
  push:
    branches: [main]
    paths:
      - '.github/ci/Dockerfile'
      - '.github/ci/versions.env'
      - '.github/workflows/ci-image.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (defaults to latest)'
        required: false
        type: string

concurrency:
  group: ci-image-${{ github.ref }}
  cancel-in-progress: false

env:
  BUILDX_NO_DEFAULT_ATTESTATIONS: '1'

jobs:
  build:
    name: Build and Push CI Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: name
        run: echo "image=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')-ci" >> "$GITHUB_OUTPUT"

      # $GITHUB_ENV rejects comment and blank lines, so they must be stripped rather than
      # cat'd through.
      - name: Load pinned versions
        run: grep -Ev '^\s*(#|$)' .github/ci/versions.env >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/ci/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.name.outputs.image }}:${{ inputs.tag || 'latest' }}
            ${{ steps.name.outputs.image }}:${{ github.sha }}
          build-args: |
            CLAUDE_CODE_VERSION=${{ env.CLAUDE_CODE_VERSION }}
            CODEX_CLI_VERSION=${{ env.CODEX_CLI_VERSION }}
            ACTIONLINT_VERSION=${{ env.ACTIONLINT_VERSION }}
            NODE_MAJOR=${{ env.NODE_MAJOR }}
            UV_VERSION=${{ env.UV_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          cache-from: |
            type=gha
            type=registry,ref=${{ steps.name.outputs.image }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ steps.name.outputs.image }}:buildcache,mode=max

      - name: Verify the tools are present and runnable
        run: |
          IMAGE="${{ steps.name.outputs.image }}:${{ inputs.tag || 'latest' }}"
          docker pull "$IMAGE"
          # -lc, because the PATH for the agent binaries is set in /etc/profile.d.
          docker run --rm "$IMAGE" -lc '
            set -e
            echo "claude:    $(claude --version)"
            echo "codex:     $(codex --version)"
            echo "gh:        $(gh --version | head -1)"
            echo "uv:        $(uv --version)"
            echo "python:    $(uv run --python '"${PYTHON_VERSION}"' python --version)"
            echo "node:      $(node --version)"
            echo "actionlint: $(actionlint --version | head -1)"
            test "$(id -u)" = "1000"
          '

      - name: Summary
        run: |
          {
            echo "### CI image published"
            echo
            echo "\`${{ steps.name.outputs.image }}:${{ inputs.tag || 'latest' }}\`"
            echo
            echo "| tool | version |"
            echo "|---|---|"
            echo "| Claude Code | ${CLAUDE_CODE_VERSION} |"
            echo "| Codex CLI | ${CODEX_CLI_VERSION} |"
            echo "| actionlint | ${ACTIONLINT_VERSION} |"
            echo "| Node | ${NODE_MAJOR} |"
            echo "| uv | ${UV_VERSION} |"
            echo "| Python | ${PYTHON_VERSION} |"
          } >> "$GITHUB_STEP_SUMMARY"
