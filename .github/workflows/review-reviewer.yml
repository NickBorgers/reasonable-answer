---
name: Review pipeline — reviewer

# Runs one reviewer role. Called once per applicable role by review-pipeline.yml.
#
# The reviewer is strictly read-only: it produces a JSON artifact and a PR comment, and
# has no path to the branch. That is what makes the whole graph safe to run against
# agent-authored code — no stage here can push.

on:
  workflow_call:
    inputs:
      role:
        required: true
        type: string
      agent:
        description: 'claude | codex'
        required: true
        type: string
      pr_number:
        required: true
        type: string
      reviewed_sha:
        required: true
        type: string
      base_ref:
        required: true
        type: string
      cycle:
        required: true
        type: string
    secrets:
      WORKFLOW_PAT:
        required: true

permissions:
  contents: read
  issues: read
  packages: read
  pull-requests: read
  statuses: write
  actions: read

jobs:
  # Everything below runs on GitHub-hosted infrastructure and must pass before a
  # self-hosted runner is allocated at all.
  #
  # The caller chain (review-entry → review-pipeline → here) already authorizes, but
  # that protection is INHERITED. Re-checking locally means the guarantee belongs to
  # this workflow: a future caller that forgets to authorize cannot expose the homelab
  # runners to a fork's code, because this job is between them and the runner.
  guard:
    name: Guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      ok: ${{ steps.authorize.outputs.ok }}
    steps:
      - name: Re-verify origin, author, and validation status
        id: authorize
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          REVIEWED_SHA: ${{ inputs.reviewed_sha }}
        with:
          github-token: ${{ secrets.WORKFLOW_PAT }}
          script: |
            const allowed = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const repoFullName = `${context.repo.owner}/${context.repo.repo}`;
            const prNumber = Number(process.env.PR_NUMBER);
            const sha = process.env.REVIEWED_SHA;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber,
            });

            // A fork's code must never reach a self-hosted runner: the agent runs with
            // permissions bypassed and the runner sits on a private tailnet.
            if (pr.head.repo.full_name !== repoFullName) {
              core.setFailed(`Refusing to review a fork PR on self-hosted infrastructure: ${pr.head.repo.full_name}`);
              return core.setOutput('ok', 'false');
            }
            if (!allowed.has(pr.author_association)) {
              core.setFailed(`Refusing to review a PR from an untrusted author: ${pr.author_association}`);
              return core.setOutput('ok', 'false');
            }
            // The reviewed SHA must still be the PR head. If the branch moved on, the
            // agent would burn a run on code that is already superseded.
            if (pr.head.sha !== sha) {
              core.warning(`Reviewed SHA ${sha} is no longer PR head (${pr.head.sha}); skipping.`);
              return core.setOutput('ok', 'false');
            }

            // Require PR Validation to have passed on this exact commit before spending
            // agent time. Reviewing code that does not lint, build, or pass its tests
            // produces findings the author already knows about.
            for (let attempt = 1; attempt <= 10; attempt++) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner, repo: context.repo.repo, ref: sha, per_page: 100,
              });
              const gate = checks.check_runs.find((c) => c.name === 'PR Validation Required');
              if (gate?.status === 'completed') {
                if (gate.conclusion === 'success') {
                  core.info('PR Validation passed; proceeding.');
                  return core.setOutput('ok', 'true');
                }
                core.warning(`PR Validation concluded '${gate.conclusion}'; skipping review until it passes.`);
                return core.setOutput('ok', 'false');
              }
              core.info(`Attempt ${attempt}/10: PR Validation not finished yet; waiting 15s...`);
              await new Promise((r) => setTimeout(r, 15000));
            }
            core.warning('PR Validation did not complete in time; skipping review.');
            core.setOutput('ok', 'false');

  review:
    name: ${{ inputs.role }}
    needs: guard
    if: needs.guard.outputs.ok == 'true'
    runs-on: [self-hosted, homelab]
    # The agent has its own 30m timeout inside the container. This is the outer bound
    # that also covers a hung image pull or a wedged docker daemon — without it a stuck
    # job holds a scarce self-hosted runner for GitHub's 6-hour default.
    timeout-minutes: 45
    steps:
      - name: Checkout main (actions, prompts, schema)
        uses: actions/checkout@v4
        with:
          ref: main

      # The reviewed code goes in a subdirectory, so the agent reads its prompt, the
      # schema, and the runner script from `main` while reviewing the PR's tree. A PR
      # cannot rewrite the instructions used to review it.
      - name: Checkout the reviewed SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.reviewed_sha }}
          fetch-depth: 0
          path: pr-head

      - name: Stage the prompt into the reviewed checkout
        env:
          ROLE: ${{ inputs.role }}
        run: |
          set -euo pipefail
          mkdir -p "pr-head/.review-prompt"
          cp ".github/scripts/review/prompts/${ROLE}.md" "pr-head/.review-prompt/${ROLE}.md"
          cp ".github/scripts/review/schema/reviewer-v1.json" "pr-head/.review-prompt/reviewer-v1.json"

      - name: Run the reviewer
        id: run
        uses: ./.github/actions/review-agent-run
        with:
          agent: ${{ inputs.agent }}
          role: ${{ inputs.role }}
          prompt_path: .review-prompt/${{ inputs.role }}.md
          image: ${{ vars.CI_IMAGE || format('ghcr.io/nickborgers/{0}-ci:latest', 'reasonable-answer') }}
          workspace_folder: pr-head
          pr_number: ${{ inputs.pr_number }}
          reviewed_sha: ${{ inputs.reviewed_sha }}
          base_ref: ${{ inputs.base_ref }}
          cycle: ${{ inputs.cycle }}
          workflow_pat: ${{ secrets.WORKFLOW_PAT }}
          llm_proxy_base_url: ${{ vars.LLM_PROXY_BASE_URL }}
          llm_proxy_openai_base_url: ${{ vars.LLM_PROXY_OPENAI_BASE_URL }}
          llm_proxy_api_key: ${{ vars.AI_API_KEY || 'fake-key' }}

      # Validated against main's schema, not the PR's. A PR that widened the schema to
      # let its own reviewer emit something unexpected would be validating against its
      # own definition of valid.
      - name: Validate the artifact against the schema
        env:
          RESULT_JSON: ${{ steps.run.outputs.result_json }}
          EXPECTED_ROLE: ${{ inputs.role }}
          EXPECTED_SHA: ${{ inputs.reviewed_sha }}
          EXPECTED_CYCLE: ${{ inputs.cycle }}
        run: |
          set -euo pipefail

          MAIN_SCHEMA=".github/scripts/review/schema/reviewer-v1.json"
          PR_SCHEMA="pr-head/.github/scripts/review/schema/reviewer-v1.json"
          ROLE_VALUE=$(jq -r '.role' "$RESULT_JSON")

          # --spec=draft2020 is required: the schema declares
          # $schema: json-schema.org/draft/2020-12, and without the flag ajv-cli@5 fails
          # to register the meta-schema and dies with "no schema with key or ref".
          #
          # Main's schema is authoritative — a PR cannot redefine the rules its own
          # artifacts are validated against.
          if jq -e --arg r "$ROLE_VALUE" '.properties.role.enum | index($r) != null' "$MAIN_SCHEMA" >/dev/null; then
            npx --yes ajv-cli@5 validate --spec=draft2020 --strict=false -s "$MAIN_SCHEMA" -d "$RESULT_JSON"
          else
            # Narrow bootstrap shim for adding a reviewer role. Without it, a new role
            # needs two merges: the enum must reach main before a PR may emit it.
            # Accept the PR-head schema ONLY if its role enum is a strict superset of
            # main's — new roles allowed, existing ones may not be removed — and then
            # validate against MAIN's schema with only the enum widened, so no other
            # constraint can be relaxed by the PR.
            [ -f "$PR_SCHEMA" ] || { echo "::error::role '$ROLE_VALUE' unknown and no PR-head schema present"; exit 1; }

            for role in $(jq -r '.properties.role.enum[]' "$MAIN_SCHEMA"); do
              if ! jq -e --arg r "$role" '.properties.role.enum | index($r) != null' "$PR_SCHEMA" >/dev/null; then
                echo "::error::PR-head schema removes role '$role' present in main; refusing bootstrap shim"
                exit 1
              fi
            done

            UNION=$(jq -s '[.[0].properties.role.enum[], .[1].properties.role.enum[]] | unique' "$MAIN_SCHEMA" "$PR_SCHEMA")
            TEMP_SCHEMA=$(mktemp)
            jq --argjson u "$UNION" '.properties.role.enum = $u' "$MAIN_SCHEMA" > "$TEMP_SCHEMA"
            echo "::notice::role '$ROLE_VALUE' is new in this PR; validating against main's schema with a widened role enum"
            npx --yes ajv-cli@5 validate --spec=draft2020 --strict=false -s "$TEMP_SCHEMA" -d "$RESULT_JSON"
            rm -f "$TEMP_SCHEMA"
          fi

          # Schema validity is not enough: an artifact that is well-formed but claims a
          # different SHA, role, or cycle would be silently aggregated into the wrong
          # epoch. The judge rejects mixed epochs, but catching it here says which
          # reviewer went wrong.
          actual_role=$(jq -r '.role' "$RESULT_JSON")
          actual_sha=$(jq -r '.reviewed_sha' "$RESULT_JSON")
          actual_cycle=$(jq -r '.cycle' "$RESULT_JSON")

          fail=0
          [ "$actual_role" = "$EXPECTED_ROLE" ] || { echo "::error::role mismatch: $actual_role != $EXPECTED_ROLE"; fail=1; }
          [ "$actual_sha" = "$EXPECTED_SHA" ] || { echo "::error::reviewed_sha mismatch: $actual_sha != $EXPECTED_SHA"; fail=1; }
          [ "$actual_cycle" = "$EXPECTED_CYCLE" ] || { echo "::error::cycle mismatch: $actual_cycle != $EXPECTED_CYCLE"; fail=1; }
          exit "$fail"

      - name: Publish the reviewer comment
        uses: ./.github/actions/review-publish
        with:
          artifact_path: ${{ steps.run.outputs.result_json }}
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ secrets.WORKFLOW_PAT }}

      # Only a VALIDATED artifact is published under the name the judge consumes.
      #
      # Uploading unconditionally meant an artifact that had just failed schema
      # validation was still downloaded and aggregated into the verdict — a reviewer
      # could fail and still count toward clearing the merge gate. The judge now also
      # requires every selected role to be present, so a reviewer that fails here goes
      # on to fail the whole run closed rather than quietly dropping out of the set.
      - name: Upload the reviewer artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-${{ inputs.role }}-${{ inputs.reviewed_sha }}
          path: pr-head/.review-output/${{ inputs.role }}-*
          retention-days: 7
          # `.review-output` is a dot-directory, and upload-artifact@v4 excludes hidden
          # paths by default. Without this every reviewer artifact is silently dropped,
          # the judge receives an empty reviewer set, and the run fails closed as a
          # pipeline_error that says nothing about the actual cause.
          include-hidden-files: true
          # A reviewer that produced no artifact is a failure worth surfacing here,
          # rather than one discovered three jobs later as a confusing judge error.
          if-no-files-found: error

      # Kept separately so a failed review is still debuggable. The name deliberately
      # does not match the judge's `reviewer-*-<sha>` download pattern.
      - name: Upload diagnostics for a failed reviewer
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-reviewer-${{ inputs.role }}-${{ inputs.reviewed_sha }}
          path: pr-head/.review-output/${{ inputs.role }}-*
          retention-days: 7
          include-hidden-files: true
          if-no-files-found: warn
