---
name: Issue Resolution Agent

# An issue filed by a trusted author starts an agent immediately. Four entry points:
#
#   issues: opened      — filing it is the request
#   issues: reopened    — reopening asks for another attempt
#   issues: unlabeled   — removing `<agent>-started` is the retry gesture (see below)
#   issue_comment       — `/autoresolve` on an existing issue
#
#   /autoresolve            use the repository default agent
#   /autoresolve claude     force Claude Code
#   /autoresolve codex      force Codex
#
# An `agent:claude` / `agent:codex` label is a persistent per-issue override; a comment's
# explicit choice outranks it.
#
# THE `<agent>-started` LABEL IS NEVER REMOVED BY THIS WORKFLOW.
#
# That is load-bearing, not an oversight. The label means "an agent has attempted this",
# and a human removing it is how you ask for another attempt. Every label write here uses
# WORKFLOW_PAT, and PAT-driven events DO trigger workflows — so a workflow that cleared
# its own label would fire its own `unlabeled` trigger on the way out and retry forever.
# The existing-PR check does not bound that: it only skips once a PR exists, which is
# exactly not the case when the agent failed, which is exactly when a retry fires.
#
# Adding a label emits `labeled`, which is deliberately absent from the trigger list, so
# marking an issue started is safe.

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, reopened, unlabeled]

concurrency:
  # `github.run_id` fallback: an `issues` event still carries an issue number, but the
  # fallback keeps the expression total if that is ever absent rather than collapsing
  # every run into one group named `autoresolve-`.
  group: autoresolve-${{ github.event.issue.number || github.run_id }}
  # NOT cancel-in-progress.
  #
  # This workflow comments on the issue when it finishes, and that comment fires
  # `issue_comment` — landing a new run in this very group. With cancellation on, the
  # workflow killed itself on the way out: the run that had just done 5 minutes of agent
  # work was cancelled by the notification it had posted about its own success.
  #
  # Any human comment did the same thing, so a passing remark mid-run destroyed it.
  #
  # Queuing instead is safe. The `Check for an existing PR` step makes a second run a
  # no-op once a PR exists, and the `<agent>-started` label records that an attempt
  # happened, so duplicates converge rather than pile up.
  cancel-in-progress: false

permissions:
  contents: read
  issues: read
  packages: read
  pull-requests: read

jobs:
  authorize:
    name: Authorize
    # Cheap pre-filter so the job does not even start on ordinary comments or on label
    # churn unrelated to the retry gesture. `github.event.issue.pull_request == null`
    # excludes PRs, which arrive through the same issue_comment event.
    if: |
      github.event.issue.pull_request == null && (
        (github.event_name == 'issue_comment' &&
         startsWith(github.event.comment.body, '/autoresolve')) ||
        (github.event_name == 'issues' && (
          github.event.action == 'opened' ||
          github.event.action == 'reopened' ||
          (github.event.action == 'unlabeled' && (
            github.event.label.name == 'claude-started' ||
            github.event.label.name == 'codex-started'
          ))
        ))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
      agent: ${{ steps.check.outputs.agent }}
    steps:
      # Without the PAT there is nothing this can do. Say so once, clearly, instead of
      # failing deep inside the agent job with a gh authentication error.
      - name: Check the pipeline is configured
        id: configured
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
        run: |
          if [ -z "$WORKFLOW_PAT" ]; then
            echo "::notice title=Resolver not configured::WORKFLOW_PAT is not set. See docs/ci-setup.md step 2. Skipping."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check trust and select agent
        if: steps.configured.outputs.configured == 'true'
        id: check
        uses: actions/github-script@v7
        env:
          DEFAULT_AGENT: ${{ vars.CI_AGENT_DEFAULT || 'claude' }}
        with:
          script: |
            const allowed = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            // Absent on `issues` events — filing, reopening, and unlabeling carry no
            // comment. Every read of it below must tolerate that.
            const comment = context.payload.comment;
            const issue = context.payload.issue;
            const sender = context.payload.sender;

            // The issue author must always be trusted: their text is what reaches an
            // agent holding a write-capable PAT.
            //
            // On `issue_comment` the commenter must be trusted too. Checking only the
            // commenter would let a trusted user's `/autoresolve` feed an untrusted
            // stranger's issue text to that agent; checking only the author would let a
            // stranger's comment start a run on a trusted issue.
            //
            // On `issues` events there is no commenter, so the actor who filed,
            // reopened, or unlabeled is the second party to check. `unlabeled` matters
            // most here: removing a label is the retry gesture, and label edits are open
            // to anyone with triage rights, who need not be a collaborator.
            let authorized = true;
            let reason = '';
            if (!allowed.has(issue.author_association)) {
              authorized = false;
              reason = `issue-author:${issue.author_association}`;
            } else if (comment && !allowed.has(comment.author_association)) {
              authorized = false;
              reason = `comment-author:${comment.author_association}`;
            } else if (!comment) {
              // author_association is not on the `issues` payload's sender, so ask.
              const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: sender.login,
              });
              if (!['admin', 'write'].includes(perm.permission)) {
                authorized = false;
                reason = `actor:${sender.login}:${perm.permission}`;
              }
            }

            // Explicit choice in the comment wins, then an `agent:*` label, then the
            // repository default. On `issues` events there is no comment, so the label
            // is the only override available.
            const body = ((comment && comment.body) || '').trim();
            const explicit = body.match(/^\/autoresolve\s+(claude|codex)\b/);
            const labels = (issue.labels || []).map((l) => (l.name || l));
            let agent = process.env.DEFAULT_AGENT;
            if (explicit) {
              agent = explicit[1];
            } else if (labels.includes('agent:codex')) {
              agent = 'codex';
            } else if (labels.includes('agent:claude')) {
              agent = 'claude';
            }

            core.info(authorized
              ? `autoresolve authorized for issue #${issue.number} using ${agent}`
              : `autoresolve refused: ${reason}`);

            core.setOutput('authorized', authorized ? 'true' : 'false');
            core.setOutput('agent', agent);

  resolve:
    name: Resolve issue
    needs: authorize
    # The association checks are repeated here, not merely inherited from `authorize`.
    # This job is what puts an agent on a self-hosted runner with a write-capable PAT,
    # so its entry condition should be readable in one place without having to trust
    # that an upstream job computed its output correctly.
    #
    # The commenter check applies only to `issue_comment`; on `issues` events there is no
    # comment, and `github.event.comment.author_association` would be the empty string,
    # which `contains()` rejects — silently disabling every issue-lifecycle entry point.
    if: |
      needs.authorize.outputs.authorized == 'true' &&
      github.event.issue.state == 'open' &&
      github.event.issue.pull_request == null &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association) &&
      (github.event_name != 'issue_comment' ||
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: [self-hosted, homelab]
    # Outer bound over the agent's own 60m timeout; see review-reviewer.yml.
    timeout-minutes: 80
    steps:
      # WORKFLOW_PAT, not GITHUB_TOKEN. A PR opened with GITHUB_TOKEN does not trigger
      # workflows, so the PR this job creates would never get reviewed — the loop would
      # look like it worked and quietly do nothing.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          fetch-depth: 0

      - name: Check for an existing PR
        id: existing
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          FOUND=$(gh pr list --repo "$REPO" --state open \
            --search "Resolves #${ISSUE_NUMBER} OR Fixes #${ISSUE_NUMBER} OR Closes #${ISSUE_NUMBER}" \
            --json number --jq '.[0].number // empty')
          if [ -n "$FOUND" ]; then
            echo "An open PR (#${FOUND}) already resolves this issue; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark the issue as started
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AGENT: ${{ needs.authorize.outputs.agent }}
        run: |
          set -euo pipefail
          gh label create "${AGENT}-started" --repo "$REPO" --color 7057ff \
            --description "An agent has attempted this issue; remove to retry" 2>/dev/null || true

          # ADD ONLY. Nothing in this workflow may remove a `<agent>-started` label.
          #
          # Removing one is the retry gesture, and these writes use WORKFLOW_PAT, whose
          # events do trigger workflows. Clearing a stale marker here would fire this
          # workflow's own `unlabeled` trigger and start a second run of itself.
          #
          # Adding emits `labeled`, which is deliberately not in the trigger list.
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "${AGENT}-started"

      - name: Create the working branch
        if: steps.existing.outputs.skip != 'true'
        id: branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          BRANCH="agent/issue-${ISSUE_NUMBER}-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Render the prompt
        if: steps.existing.outputs.skip != 'true'
        id: prompt
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO: ${{ github.repository }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
          AGENT: ${{ needs.authorize.outputs.agent }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # envsubst rather than inlining the prompt in YAML: a prompt change stays a
          # plain markdown diff with no escaping to get wrong. Only the named variables
          # are substituted, so `$` in prose survives.
          mkdir -p .agent-prompt
          # shellcheck disable=SC2016  # envsubst's allowlist argument is a list of
          # variable NAMES and must not be expanded by the shell — expanding it would
          # substitute the values here and leave envsubst with nothing to match.
          envsubst '${ISSUE_NUMBER} ${ISSUE_TITLE} ${REPO} ${BRANCH_NAME} ${AGENT} ${RUN_ID}' \
            < .github/ci/prompts/resolve-issue.md > .agent-prompt/resolve-issue.md
          echo "path=.agent-prompt/resolve-issue.md" >> "$GITHUB_OUTPUT"

      # The agent's conversation is the thing the review pipeline's fixer wants later:
      # resuming the author beats handing a stranger the diff and a list of complaints.
      # Container state is discarded on exit, so the session directory has to be a mount.
      - name: Prepare the author session directory
        if: steps.existing.outputs.skip != 'true'
        id: session
        env:
          AGENT: ${{ needs.authorize.outputs.agent }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          DIR=$(./scripts/ci-session-store.sh prepare "$AGENT" "$ISSUE_NUMBER" "$RUN_ID")
          echo "dir=${DIR}" >> "$GITHUB_OUTPUT"
          echo "Author session directory: ${DIR}"

      - name: Run the agent
        if: steps.existing.outputs.skip != 'true'
        uses: ./.github/actions/review-agent-run
        with:
          agent: ${{ needs.authorize.outputs.agent }}
          role: resolve-issue
          prompt_path: ${{ steps.prompt.outputs.path }}
          image: ${{ vars.CI_IMAGE || 'ghcr.io/nickborgers/reasonable-answer-ci:latest' }}
          workspace_folder: .
          pr_number: ${{ github.event.issue.number }}
          reviewed_sha: ${{ github.sha }}
          base_ref: ${{ github.event.repository.default_branch }}
          cycle: '1'
          timeout_minutes: '60'
          # The resolver's deliverable is a PR, not a JSON artifact; its prompt never
          # asks for one. Requiring it made every successful resolver run report failure.
          expect_result: 'false'
          session_host_dir: ${{ steps.session.outputs.dir }}
          workflow_pat: ${{ secrets.WORKFLOW_PAT }}
          llm_proxy_base_url: ${{ vars.LLM_PROXY_BASE_URL }}
          llm_proxy_openai_base_url: ${{ vars.LLM_PROXY_OPENAI_BASE_URL }}
          llm_proxy_api_key: ${{ vars.AI_API_KEY || 'fake-key' }}

      - name: Report back on the issue
        if: always() && steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTCOME: ${{ job.status }}
          AGENT: ${{ needs.authorize.outputs.agent }}
        run: |
          set -euo pipefail
          PR=$(gh pr list --repo "$REPO" --state open \
            --search "Resolves #${ISSUE_NUMBER}" --json number --jq '.[0].number // empty')
          if [ -n "$PR" ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
              --body "Opened #${PR}. The review pipeline will run on it automatically. ([run log](${RUN_URL}))"
          else
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
              --body "The agent finished with status \`${OUTCOME}\` but did not open a PR. Remove the \`${AGENT}-started\` label to try again. ([run log](${RUN_URL}))"
          fi

          # The `<agent>-started` label is deliberately left in place; see the header.
          # Clearing it here would fire this workflow's own `unlabeled` trigger, and a
          # run that failed to open a PR would retry itself forever.

      - name: Upload the agent transcript
        if: always() && steps.existing.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: resolve-issue-${{ github.event.issue.number }}-${{ github.run_id }}
          path: .review-output/resolve-issue-*
          retention-days: 7
          if-no-files-found: warn

      # The container writes its transcript as uid 1000; this runner is a different uid.
      # `prepare` chmods the directory before the container starts, which does nothing for
      # files created inside it afterwards — those land 0600, owned by the container user.
      # `tar` then fails with "Cannot open: Permission denied" on the very files that are
      # the point of the exercise, the session artifact is never uploaded, and the fixer
      # silently falls back to cold on every PR the resolver opens.
      #
      # Same uid-mismatch class as the workspace ownership reset in review-agent-run, and
      # it needs the same treatment for the directory that action does not own.
      - name: Reclaim the author session from the container uid
        if: always() && steps.existing.outputs.skip != 'true'
        env:
          SESSION_DIR: ${{ steps.session.outputs.dir }}
        run: |
          set -euo pipefail
          if [ -n "$SESSION_DIR" ] && [ -d "$SESSION_DIR" ]; then
            sudo chown -R "$(id -u):$(id -g)" "$SESSION_DIR"
            chmod -R u+rwX "$SESSION_DIR"
            echo "Reclaimed $(find "$SESSION_DIR" -type f | wc -l) session file(s)."
          else
            echo "No session directory to reclaim."
          fi

      # Pack the conversation for the fixer. Best-effort: an agent that died before
      # writing a session leaves nothing to pack, and that must not fail a run that
      # otherwise opened a good PR — the fixer degrades to a cold run and says so.
      - name: Pack the author session
        id: pack
        if: always() && steps.existing.outputs.skip != 'true'
        continue-on-error: true
        env:
          AGENT: ${{ needs.authorize.outputs.agent }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          TAR="${RUNNER_TEMP}/author-session.tgz"
          ./scripts/ci-session-store.sh pack "$AGENT" "$ISSUE_NUMBER" "$RUN_ID" "$TAR"
          echo "tar=${TAR}" >> "$GITHUB_OUTPUT"

      # The name is the contract: review-fixer.yml reconstructs it from the
      # `Author-Session: <agent>/<run-id>` trailer in the PR body. Changing this format
      # silently disables author-resume rather than failing anything.
      - name: Upload the author session
        if: always() && steps.pack.outcome == 'success' && steps.pack.outputs.tar != ''
        uses: actions/upload-artifact@v4
        with:
          name: author-session-${{ needs.authorize.outputs.agent }}-${{ github.run_id }}
          path: ${{ steps.pack.outputs.tar }}
          retention-days: 7
          if-no-files-found: error
