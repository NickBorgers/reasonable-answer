---
name: Issue Resolution Agent

# Opt-in only: an issue is resolved when a trusted user comments `/autoresolve`, never
# merely by being filed. Auto-triggering on `issues: opened` would spend an agent run on
# every thought anyone writes down.
#
#   /autoresolve            use the repository default agent
#   /autoresolve claude     force Claude Code
#   /autoresolve codex      force Codex

on:
  issue_comment:
    types: [created]

concurrency:
  group: autoresolve-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  packages: read
  pull-requests: read

jobs:
  authorize:
    name: Authorize
    # Cheap pre-filter so the job does not even start on ordinary comments.
    if: |
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/autoresolve')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
      agent: ${{ steps.check.outputs.agent }}
    steps:
      # Without the PAT there is nothing this can do. Say so once, clearly, instead of
      # failing deep inside the agent job with a gh authentication error.
      - name: Check the pipeline is configured
        id: configured
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
        run: |
          if [ -z "$WORKFLOW_PAT" ]; then
            echo "::notice title=Resolver not configured::WORKFLOW_PAT is not set. See docs/ci-setup.md step 2. Skipping."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check trust and select agent
        if: steps.configured.outputs.configured == 'true'
        id: check
        uses: actions/github-script@v7
        env:
          DEFAULT_AGENT: ${{ vars.CI_AGENT_DEFAULT || 'claude' }}
        with:
          script: |
            const allowed = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const comment = context.payload.comment;
            const issue = context.payload.issue;

            // Both the commenter AND the issue author must be trusted. Checking only
            // the commenter would let a trusted user's `/autoresolve` feed an untrusted
            // stranger's issue text to an agent that holds a write-capable PAT.
            let authorized = true;
            let reason = '';
            if (!allowed.has(comment.author_association)) {
              authorized = false;
              reason = `comment-author:${comment.author_association}`;
            } else if (!allowed.has(issue.author_association)) {
              authorized = false;
              reason = `issue-author:${issue.author_association}`;
            }

            // Explicit choice in the comment wins, then an `agent:*` label, then the
            // repository default.
            const body = (comment.body || '').trim();
            const explicit = body.match(/^\/autoresolve\s+(claude|codex)\b/);
            const labels = (issue.labels || []).map((l) => (l.name || l));
            let agent = process.env.DEFAULT_AGENT;
            if (explicit) {
              agent = explicit[1];
            } else if (labels.includes('agent:codex')) {
              agent = 'codex';
            } else if (labels.includes('agent:claude')) {
              agent = 'claude';
            }

            core.info(authorized
              ? `autoresolve authorized for issue #${issue.number} using ${agent}`
              : `autoresolve refused: ${reason}`);

            core.setOutput('authorized', authorized ? 'true' : 'false');
            core.setOutput('agent', agent);

  resolve:
    name: Resolve issue
    needs: authorize
    # The association checks are repeated here, not merely inherited from `authorize`.
    # This job is what puts an agent on a self-hosted runner with a write-capable PAT,
    # so its entry condition should be readable in one place without having to trust
    # that an upstream job computed its output correctly.
    if: |
      needs.authorize.outputs.authorized == 'true' &&
      github.event.issue.state == 'open' &&
      github.event.issue.pull_request == null &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: [self-hosted, homelab]
    # Outer bound over the agent's own 60m timeout; see review-reviewer.yml.
    timeout-minutes: 80
    steps:
      # WORKFLOW_PAT, not GITHUB_TOKEN. A PR opened with GITHUB_TOKEN does not trigger
      # workflows, so the PR this job creates would never get reviewed — the loop would
      # look like it worked and quietly do nothing.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          fetch-depth: 0

      - name: Check for an existing PR
        id: existing
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          FOUND=$(gh pr list --repo "$REPO" --state open \
            --search "Resolves #${ISSUE_NUMBER} OR Fixes #${ISSUE_NUMBER} OR Closes #${ISSUE_NUMBER}" \
            --json number --jq '.[0].number // empty')
          if [ -n "$FOUND" ]; then
            echo "An open PR (#${FOUND}) already resolves this issue; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark the issue as started
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AGENT: ${{ needs.authorize.outputs.agent }}
        run: |
          set -euo pipefail
          gh label create "${AGENT}-started" --repo "$REPO" --color 7057ff \
            --description "An agent is working on this issue" 2>/dev/null || true
          # Clear any stale marker from a previous attempt before setting this one.
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --remove-label claude-started --remove-label codex-started 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "${AGENT}-started"

      - name: Create the working branch
        if: steps.existing.outputs.skip != 'true'
        id: branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          BRANCH="agent/issue-${ISSUE_NUMBER}-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Render the prompt
        if: steps.existing.outputs.skip != 'true'
        id: prompt
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO: ${{ github.repository }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
        run: |
          set -euo pipefail
          # envsubst rather than inlining the prompt in YAML: a prompt change stays a
          # plain markdown diff with no escaping to get wrong. Only the named variables
          # are substituted, so `$` in prose survives.
          mkdir -p .agent-prompt
          # shellcheck disable=SC2016  # envsubst's allowlist argument is a list of
          # variable NAMES and must not be expanded by the shell — expanding it would
          # substitute the values here and leave envsubst with nothing to match.
          envsubst '${ISSUE_NUMBER} ${ISSUE_TITLE} ${REPO} ${BRANCH_NAME}' \
            < .github/ci/prompts/resolve-issue.md > .agent-prompt/resolve-issue.md
          echo "path=.agent-prompt/resolve-issue.md" >> "$GITHUB_OUTPUT"

      - name: Run the agent
        if: steps.existing.outputs.skip != 'true'
        uses: ./.github/actions/review-agent-run
        with:
          agent: ${{ needs.authorize.outputs.agent }}
          role: resolve-issue
          prompt_path: ${{ steps.prompt.outputs.path }}
          image: ${{ vars.CI_IMAGE || 'ghcr.io/nickborgers/reasonable-answer-ci:latest' }}
          workspace_folder: .
          pr_number: ${{ github.event.issue.number }}
          reviewed_sha: ${{ github.sha }}
          base_ref: ${{ github.event.repository.default_branch }}
          cycle: '1'
          timeout_minutes: '60'
          workflow_pat: ${{ secrets.WORKFLOW_PAT }}
          llm_proxy_base_url: ${{ vars.LLM_PROXY_BASE_URL }}
          llm_proxy_openai_base_url: ${{ vars.LLM_PROXY_OPENAI_BASE_URL }}
          llm_proxy_api_key: ${{ vars.AI_API_KEY || 'fake-key' }}

      - name: Report back on the issue
        if: always() && steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTCOME: ${{ job.status }}
        run: |
          set -euo pipefail
          PR=$(gh pr list --repo "$REPO" --state open \
            --search "Resolves #${ISSUE_NUMBER}" --json number --jq '.[0].number // empty')
          if [ -n "$PR" ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
              --body "Opened #${PR}. The review pipeline will run on it automatically. ([run log](${RUN_URL}))"
          else
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
              --body "The agent finished with status \`${OUTCOME}\` but did not open a PR. ([run log](${RUN_URL}))"
          fi
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" \
            --remove-label claude-started --remove-label codex-started 2>/dev/null || true

      - name: Upload the agent transcript
        if: always() && steps.existing.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: resolve-issue-${{ github.event.issue.number }}-${{ github.run_id }}
          path: .review-output/resolve-issue-*
          retention-days: 7
          if-no-files-found: warn
