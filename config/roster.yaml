# Role-structured roster (docs/architecture.md).
#
# writers       — models that author reports (round-robin, never the previous author)
# critics       — per-lens pools; a model may be critic-only (never a writer), which is
#                 the clean way to satisfy author-exclusion. Each lens wants >=2 eligible
#                 NON-AUTHOR models for a strong `accepted`.
# orchestrator  — the blind referee's model (optional; defaults to writers[0]). Its whole
#                 job is bounded ints in, one boolean out, so it needs no reach.
#
# Aliases are LiteLLM proxy aliases; their resolved provider/model is fetched from
# the proxy at startup and distinctness is enforced at that level (RA-017).
#
# Every entry is open-weight and loadable on the target local box (D18). The ceiling is
# ~450GB for a single model, with swapping — see docs/DESIGN.md for the footprint table.

proxy:
  # base_url is the fallback: $RA_PROXY_BASE_URL (or whatever base_url_env names)
  # overrides it when set, so a container can inject only its proxy URL and keep this
  # roster authoritative for everything else. Precedence: env > this value > default.
  base_url: https://llm.featherback-mermaid.ts.net/v1
  base_url_env: RA_PROXY_BASE_URL
  api_key_env: LITELLM_API_KEY
  api_key_fallback: fake-key

roster:
  writers:
    - mistral-large-3      # 675B/A41B Apache 2.0, ~340GB @4bit. Authors R1 and every odd round.
    - deepseek-v4-flash    # 284B/A13B MIT, ~145GB @4bit.

  # Free, local (ollama), and pinned in memory. Its failure mode is a skipped polish
  # pass and nothing else: rule 9 is cap-gated and the LLM can only *enable* it.
  orchestrator: gemma4-small

  # minimax-m3 probes non-deterministically: json_schema, json_object and prompt have
  # each come back across repeated `ra doctor` runs. The mode is pinned once at startup,
  # so an unlucky probe puts it on tolerant extraction with repair_retries: 1 for the
  # whole run. It is listed second on both lenses rather than first for that reason —
  # pick_critic reaches it only after glm-5.2 has already reviewed the artifact.
  critics:
    logic:
      - glm-5.2            # critic-only: highest GPQA of any shipped open model
      - minimax-m3
      - mistral-large-3    # eligible whenever deepseek-v4-flash authors
    evidence:
      - glm-5.2            # critic-only: lowest hallucination of the open frontier
      - minimax-m3
      - gemma4
    completeness:
      - mistral-large-3    # Western corpus — decorrelated priors from the CN-lab models
      - glm-5.2
      - gemma4

# Web search for writers. The code default is off; THIS deployment opts in so
# completeness demands like "cite the specific budget vote" are satisfiable instead
# of stagnating the run (run-75eb136b9bfb).
#
# Startup is fail-closed twice over: no credential is fatal, and so is a writer that
# cannot emit tool calls — that writer would still be told to produce a '## Sources'
# section and would fill it from memory, and nothing downstream can tell a remembered
# citation from a retrieved one. A contributor without a key sets `enabled: false`
# locally or points $RA_CONFIG at another roster.
#
# Credential: $BRAVE_SEARCH_API_KEY (prod) or ./brave.token (local, gitignored).
# Key from https://api-dashboard.search.brave.com/app/keys — the "Data for AI" SKU.
search:
  enabled: true
  api_key_env: BRAVE_SEARCH_API_KEY
  token_file: brave.token
  max_results: 5
  # Whole-run cap. The free tier allows 2,000 queries/month, so a 60-query run is
  # roughly 33 runs a month before it starts costing money.
  query_budget: 60
  max_tool_rounds: 6
  # The free tier is 1 request/second; requests are throttled to stay under it.
  min_interval_seconds: 1.1

  # Fetch the pages the report cites and hand them to the evidence critic, so
  # `misrepresented_source` and `fabricated_citation` stop being judgements about
  # plausibility and become checkable against the page. Independent of `enabled` —
  # a report with real citations can be verified whether or not we retrieved them.
  #
  # This fetches URLs a model chose. That is SSRF exposure by construction and is
  # expected to be constrained at the network layer, not here — deploy behind the
  # egress-isolation pattern in docs/ssrf-egress-isolation.md.
  #
  # On in this deployment: an "on its face" fabricated_citation judgement is a
  # model-prior guess (and a blocking one), while a fetch is a checkable fact.
  verify_sources: true
  max_sources: 12
  fetch_timeout_seconds: 15.0
  fetch_max_bytes: 400000
  fetch_max_chars: 6000

# Critic auditioning (docs/architecture.md). Measures whether each rostered critic can
# actually find a planted defect and stay quiet on a sound report — the question neither
# `validate_roster_health` nor `ra doctor`'s probes ask.
#
# This exists because run-d5934276fafd shipped with two lenses effectively unstaffed:
# llama-4-scout returned 0 issues on all 6 evidence calls and gemma-4-31b-it 0 on all 6
# completeness calls, across artifacts other critics found 6 and 10 material issues in.
# Every counter and status in that run read as though three lenses had reviewed it.
#
# Off by default: an audition costs |critics| x |fixtures| x repetitions calls against a
# paid proxy, and a checkout with no credential must behave exactly as it always has.
# Run it deliberately with `ra audition`; `ra doctor` only reads the cache it leaves.
#
# NOTE on this roster specifically: `gemma4` is the same model as the gemma-4-31b-it
# that flagged nothing in that run, now at position 3 on both evidence and completeness.
# Position 3 is unreachable on the first pass and is reached on the rule 8 confirmation
# top-up — where a false clean raises cleared_count to 2, satisfies strong_met, and
# terminates the run `accepted`. Audition it before trusting that lineup.
audition:
  enabled: false
  # Warn rather than abort when a critic grades `unfit`. Fail-closed is the right
  # instinct — the soundness claim is void without capable reviewers — but coupling
  # every run to a cache whose freshness depends on a rate-limited proxy means an
  # operator blocked by an expired audition disables the harness outright.
  enforce: false
  cache_path: .ra-audition.json
  max_age_days: 30
  # Critics are non-deterministic (see the minimax-m3 note above). Single-shot
  # auditioning would inherit that flakiness and report it as capability.
  repetitions: 3
  max_concurrency: 3
  thresholds:
    # Fail-closed line, measured on `tier: obvious` fixtures only. A model scoring
    # exactly 0 there is unfit regardless of this value — that case is not tunable.
    min_obvious_sensitivity: 0.5
    warn_lens_sensitivity: 0.6
    # Mean material issues invented per sound control report. Above this a critic
    # manufactures work every round and the run stagnates instead of converging.
    max_control_material_rate: 1.0
    warn_control_material_rate: 0.34
    max_schema_failure_rate: 0.2

budgets:
  min_ticks: 2
  hard_cap: 8
  polish_cap: 1
  critique_attempts: 12
  confirmation_attempts: 6
  stagnation_limit: 3
  cycle_period: 4
  repair_retries: 1
  call_retries: 2
  # Distinct writers tried for one draft before the run gives up. A model that is
  # down or answering with nothing gets routed around, not treated as a verdict.
  writer_attempts: 3
  timeout_seconds: 300
  max_concurrency: 3

runs_dir: runs
retention_days: 14
